name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        fedora-version: [40, 41, 42, 43, rawhide]

    steps:
    - name: Set up podman
      run: |
        sudo apt update
        sudo apt-get -y install podman
        podman pull registry.fedoraproject.org/fedora:${{ matrix.fedora-version }}
    - uses: actions/checkout@v5
    - name: Test with pytest
      run: |
        {
          echo 'FROM registry.fedoraproject.org/fedora:${{ matrix.fedora-version }}'
          echo 'RUN dnf install -y python3-pip python3-dnf gcc'
          echo 'WORKDIR /src'
          echo 'RUN python3 -m pip install -e . pytest pytest-cov'
          echo 'RUN pytest -v --cov=rpm_lockfile --cov-report=xml:coverage.xml'
        } > podmanfile
        podman build -v $(pwd):/src --tag test -f ./podmanfile
    # One upload per workflow (matrix runs 5 Fedoras; avoid duplicate uploads)
    - name: Upload coverage to Codecov
      if: matrix.fedora-version == 43
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: unit-tests
        files: coverage.xml
        fail_ci_if_error: false


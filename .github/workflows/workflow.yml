name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/ruff-action@v3

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - registry.fedoraproject.org/fedora:42
          - registry.fedoraproject.org/fedora:43
          - registry.fedoraproject.org/fedora:44
          - registry.fedoraproject.org/fedora:rawhide
          - registry.access.redhat.com/ubi9/ubi:latest
          - registry.access.redhat.com/ubi10/ubi:latest

    steps:
    - name: Set up podman
      run: |
        sudo apt update
        sudo apt-get -y install podman
        podman pull ${{ matrix.base-image }}
    - uses: actions/checkout@v5
    - name: Derive coverage flag name
      run: |
        flag=$(echo "${{ matrix.base-image }}" | sed 's|[^/]*/||' | sed 's|/ubi:latest||' | sed 's|[:/]|-|g' | sed 's|-latest$||')
        echo "COVERAGE_FLAG=$flag" >> $GITHUB_ENV
    - name: Test with pytest
      run: |
        {
          echo 'FROM ${{ matrix.base-image }}'
          echo 'RUN dnf install -y python3-pip python3-dnf gcc'
          echo 'WORKDIR /src'
          echo 'RUN python3 -m pip install -e "." pytest pytest-cov'
          echo 'RUN pytest -v --cov=rpm_lockfile --cov-report=xml:coverage.xml'
        } > podmanfile
        podman build -v $(pwd):/src --tag test -f ./podmanfile
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: ${{ env.COVERAGE_FLAG }}
        files: coverage.xml
        fail_ci_if_error: false

